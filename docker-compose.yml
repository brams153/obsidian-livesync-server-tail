services:
  couchdb:
    image: couchdb:latest
    container_name: obsidian-livesync
    user: "5984:5984"
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - ./data:/opt/couchdb/data
      - ./local.ini:/opt/couchdb/etc/local.ini
    ports:
      - "127.0.0.1:5984:5984"
    restart: unless-stopped
